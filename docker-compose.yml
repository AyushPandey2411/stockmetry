version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stockmetry
      POSTGRES_USER: stockmetry
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockmetry}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockmetry"]
      interval: 5s; timeout: 5s; retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://stockmetry:${DB_PASSWORD:-stockmetry}@db:5432/stockmetry
      SECRET_KEY: ${SECRET_KEY:-changeme}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@Stockmetry2024}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD:-Manager@Stockmetry2024}
      ANALYST_PASSWORD: ${ANALYST_PASSWORD:-Analyst@Stockmetry2024}
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      ENVIRONMENT: production
    depends_on:
      db: { condition: service_healthy }
    volumes: [./backend/models:/app/models]

  frontend:
    build:
      context: ./frontend
      args: { VITE_API_URL: "http://localhost:8000" }
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  pgdata:
