name: Stockmetry CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-check:
    name: Backend — Python Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports compile
        working-directory: ./backend
        run: |
          python -c "from app.core.config import settings; print('Config OK')"
          python -c "from app.core.security import hash_password; print('Security OK')"
          python -c "from app.ml.features import build_features; print('ML features OK')"
          python -c "from app.ml.optimizer import compute_eoq; print('EOQ OK')"

  frontend-check:
    name: Frontend — Node Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://placeholder.onrender.com
        run: npm run build