name: Stockmetry CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-check:
    name: Backend — Python Lint & Import Check
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stockmetry
      SECRET_KEY: ci-test-secret-key-not-real
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ADMIN_PASSWORD: Admin@Test123
      MANAGER_PASSWORD: Manager@Test123
      ANALYST_PASSWORD: Analyst@Test123
      ANTHROPIC_API_KEY: ""
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core imports
        working-directory: ./backend
        run: |
          python -c "from app.core.config import settings; print('✓ Config OK')"
          python -c "from app.core.security import hash_password, verify_password; print('✓ Security OK')"
          python -c "from app.ml.features import build_features, FEATURE_COLS; print('✓ Features OK')"
          python -c "from app.ml.optimizer import compute_eoq; print('✓ EOQ OK')"
          python -c "from app.main import app; print('✓ FastAPI app OK')"

  frontend-check:
    name: Frontend — Node Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://placeholder.onrender.com
        run: npm run build

      - name: Confirm build output exists
        run: |
          ls frontend/dist/
          echo "✓ Frontend build successful"